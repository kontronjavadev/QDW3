<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:p="http://primefaces.org/ui"
	template="/templates/ui.xhtml">

<f:metadata>
	<f:viewAction action="#{viewServiceOrderDialog.initView()}"/>
	<f:viewParam name="selectedObjectId" value="#{viewServiceOrderDialog.selectedObjectId}"/>
</f:metadata>

<ui:define name="title">#{viewServiceOrderDialog.formTitle}</ui:define>

<ui:define name="content">
	<p:dialog header="#{i18n.feedback_dialog_header}" modal="true" widgetVar="msgBox" visible="#{(not empty facesContext.messageList)}">
		<p:messages id="messages" showDetail="true" showSummary="true"/>
	</p:dialog>

	<h:panelGrid columns="3">
		<div class="pi pi-file" style="font-size: 2em"/>
		<h:outputText id="lblFormTitle" value="&#160;#{viewServiceOrderDialog.formTitle}" styleClass="label-form-title"/>
		<p:ajaxStatus style="width:16px;height:16px;">
			<f:facet name="start">
				<h:graphicImage value="/images/ajaxloading.gif"/>
			</f:facet>

			<f:facet name="complete">
				<h:outputText value=""/>
			</f:facet>
		</p:ajaxStatus>
	</h:panelGrid>

	<p:tabView id="tabview1" dynamic="true" effect="fade" effectDuration="fast">
	<p:tab id="tabPanServiceOrder" title="#{i18n.panel_basic_title}">
	<h:panelGrid columns="6">

		<h:outputLabel value="#{i18n.field_viewserviceorderdialog_txtcode}:" for="txtCode" styleClass="label-field-optional"/>
		<p:inputText id="txtCode" value="#{viewServiceOrderDialog.serviceOrder.code}" readonly="true">
		</p:inputText>
		<p:tooltip for="txtCode" value=""/>

		<h:outputLabel value="#{i18n.field_viewserviceorderdialog_cboserviceordertype}:" for="cboServiceOrderType" styleClass="label-field-optional"/>
		<p:inputText readonly="true" converter="#{serviceOrderTypeConverter}" id="cboServiceOrderType" value="#{viewServiceOrderDialog.serviceOrder.serviceOrderType}"/>
		<p:tooltip for="cboServiceOrderType" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_serviceorder_documentdate}:" for="txtDocumentDate" styleClass="label-field-optional"/>
		<p:inputText id="txtDocumentDate" value="#{viewServiceOrderDialog.serviceOrder.documentDate}" readonly="true">
			<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateConverter"/>
			<f:attribute name="pattern" value="#{userSession.dateFormat}"/>
			<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
		</p:inputText>
		<p:tooltip for="txtDocumentDate" value=""/>
		<h:outputLabel/>
		<h:outputLabel/>
		<h:outputLabel/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractfunctionalactiveentity_shorttext}:" for="txtShortText" styleClass="label-field-optional"/>
		<p:inputText id="txtShortText" value="#{viewServiceOrderDialog.serviceOrder.shortText}" readonly="true">
		</p:inputText>
		<p:tooltip for="txtShortText" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractfunctionalactiveentity_active}:" for="chkActive" styleClass="label-field-optional"/>
		<p:selectBooleanCheckbox id="chkActive" value="#{viewServiceOrderDialog.serviceOrder.active}" disabled="true"/>
		<p:tooltip for="chkActive" value=""/>

		<h:outputLabel value="#{i18n.lbl_assoc_serviceorder_customer}:" for="txtCustomer" styleClass="label-field-optional"/>
		<p:inputText readonly="true" id="txtCustomer" value="#{viewServiceOrderDialog.serviceOrder.customer.name}"/>
		<p:tooltip for="txtCustomer" value=""/>
		<h:outputLabel/>
		<h:outputLabel/>
		<h:outputLabel/>

		<h:outputLabel value="#{i18n.lbl_assoc_serviceorder_supplier}:" for="txtSupplier" styleClass="label-field-optional"/>
		<p:inputText readonly="true" id="txtSupplier" value="#{viewServiceOrderDialog.serviceOrder.supplier.name}"/>
		<p:tooltip for="txtSupplier" value=""/>
		<h:outputLabel/>
		<h:outputLabel/>
		<h:outputLabel/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractfunctionalactiveentity_comment}:" for="txtComment" styleClass="label-field-optional"/>
		<p:inputTextarea style="width:200px;height:80px;" id="txtComment" value="#{viewServiceOrderDialog.serviceOrder.comment}" readonly="true">
		</p:inputTextarea>
		<p:tooltip for="txtComment" value=""/>
		<h:outputLabel/>
		<h:outputLabel/>
		<h:outputLabel/>

	</h:panelGrid>
	</p:tab>
	<p:tab id="tabPanAdministration" title="#{i18n.panel_admin_title}">
	<h:panelGrid columns="3">

		<h:outputLabel value="#{i18n.lbl_attr_abstractfunctionalactiveentity_creationdate}:" for="txtCreationDate" styleClass="label-field-optional"/>
		<p:inputText id="txtCreationDate" value="#{viewServiceOrderDialog.serviceOrder.creationDate}" readonly="true">
			<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
			<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
			<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
		</p:inputText>
		<p:tooltip for="txtCreationDate" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractfunctionalactiveentity_lastupdate}:" for="txtLastUpdate" styleClass="label-field-optional"/>
		<p:inputText id="txtLastUpdate" value="#{viewServiceOrderDialog.serviceOrder.lastUpdate}" readonly="true">
			<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
			<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
			<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
		</p:inputText>
		<p:tooltip for="txtLastUpdate" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractfunctionalactiveentity_version}:" for="txtVersion" styleClass="label-field-optional"/>
		<p:inputText id="txtVersion" value="#{viewServiceOrderDialog.serviceOrder.version}" readonly="true">
		</p:inputText>
		<p:tooltip for="txtVersion" value=""/>

	</h:panelGrid>
	</p:tab>
	</p:tabView>

	<p/>

	<h:panelGrid columns="1">
		<p:commandButton id="cmdBack" value="#{i18n.command_back}" action="#{userSession.getLastPage}" immediate="true" ajax="false"/>
	</h:panelGrid>

	<p:defaultCommand target=":form:cmdBack"/>

</ui:define>
</ui:composition>
