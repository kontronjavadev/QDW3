<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:p="http://primefaces.org/ui"
	template="/templates/ui.xhtml">

<f:metadata>
	<f:viewAction action="#{viewEWSEntryDialog.initView()}"/>
	<f:viewParam name="selectedObjectId" value="#{viewEWSEntryDialog.selectedObjectId}"/>
</f:metadata>

<ui:define name="title">#{viewEWSEntryDialog.formTitle}</ui:define>

<ui:define name="content">
	<p:dialog header="#{i18n.feedback_dialog_header}" modal="true" widgetVar="msgBox" visible="#{(not empty facesContext.messageList)}">
		<p:messages id="messages" showDetail="true" showSummary="true"/>
	</p:dialog>

	<h:panelGrid columns="3">
		<div class="pi pi-file" style="font-size: 2em"/>
		<h:outputText id="lblFormTitle" value="&#160;#{viewEWSEntryDialog.formTitle}" styleClass="label-form-title"/>
		<p:ajaxStatus style="width:16px;height:16px;">
			<f:facet name="start">
				<h:graphicImage value="/images/ajaxloading.gif"/>
			</f:facet>

			<f:facet name="complete">
				<h:outputText value=""/>
			</f:facet>
		</p:ajaxStatus>
	</h:panelGrid>

<h:panelGroup layout="block" style="display: flex; flex-direction: column; #{sizeServiceBean.dialogHeight()}; #{sizeServiceBean.panelWidth()};">
	<p:tabView id="tabview1" dynamic="true" effect="fade" effectDuration="fast" style="flex: 0 0 auto;">
	<p:tab id="tabPanEWSEntry" title="#{i18n.panel_basic_title}">
	<h:panelGrid columns="6">

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_threshold}:" for="txtThreshold" styleClass="label-field-optional"/>
		<p:inputText id="txtThreshold" value="#{viewEWSEntryDialog.eWSEntry.threshold}" readonly="true">
			<f:convertNumber pattern="#{userSession.numberFormat}"/>
		</p:inputText>
		<p:tooltip for="txtThreshold" value=""/>

		<h:outputLabel value="#{i18n.lbl_assoc_ewsentry_material}:" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR;READONLY;SUPERUSER')}" for="cboMaterial" styleClass="label-field-optional"/>
		<p:commandLink rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR;READONLY;SUPERUSER')}" id="cboMaterial" style="font-weight: bold;color: #0063ac" action="#{viewEWSEntryDialog.openViewMaterialDialogLink}">
			<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{viewEWSEntryDialog.currentPageURL}"/>
			<h:outputText value="#{viewEWSEntryDialog.eWSEntry.material.materialNumber}"/>
		</p:commandLink>
		<h:outputLabel value="#{i18n.lbl_assoc_ewsentry_material}:" rendered="#{!userSession.checkAuthorizationString('ADMINISTRATOR;READONLY;SUPERUSER')}" for="cboMaterialAltLbl" styleClass="label-field-optional"/>
		<h:outputText styleClass="label-field-value" rendered="#{!userSession.checkAuthorizationString('ADMINISTRATOR;READONLY;SUPERUSER')}" id="cboMaterialAltLbl" value="#{viewEWSEntryDialog.eWSEntry.material.materialNumber}"/>
		<p:tooltip for="cboMaterial" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_type}:" for="cboType" styleClass="label-field-optional"/>
		<p:inputText readonly="true" converter="#{eWSTypeConverter}" id="cboType" value="#{viewEWSEntryDialog.eWSEntry.type}"/>
		<p:tooltip for="cboType" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_boardorsystem}:" for="chkBoardOrSystem" styleClass="label-field-optional"/>
		<p:selectBooleanCheckbox id="chkBoardOrSystem" value="#{viewEWSEntryDialog.eWSEntry.boardOrSystem}" disabled="true"/>
		<p:tooltip for="chkBoardOrSystem" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_filtercriterion}:" for="txtFilterCriterion" styleClass="label-field-optional"/>
		<p:inputTextarea style="width:200px;height:80px;" id="txtFilterCriterion" value="#{viewEWSEntryDialog.eWSEntry.filterCriterion}" readonly="true">
		</p:inputTextarea>
		<p:tooltip for="txtFilterCriterion" value=""/>
		<h:outputLabel/>
		<h:outputLabel/>
		<h:outputLabel/>

	</h:panelGrid>
	</p:tab>

	<p:tab id="tabPanAdministration" title="#{i18n.panel_admin_title}">
	<h:panelGrid columns="3">

		<h:outputLabel value="#{i18n.lbl_attr_abstractentitywithid_id}:" for="txtId" styleClass="label-field-optional"/>
		<p:inputText id="txtId" value="#{viewEWSEntryDialog.eWSEntry.id}" readonly="true">
		</p:inputText>
		<p:tooltip for="txtId" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractentitywithid_version}:" for="txtVersion" styleClass="label-field-optional"/>
		<p:inputText id="txtVersion" value="#{viewEWSEntryDialog.eWSEntry.version}" readonly="true">
		</p:inputText>
		<p:tooltip for="txtVersion" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractentitywithid_creationdate}:" for="txtCreationDate" styleClass="label-field-optional"/>
		<p:inputText id="txtCreationDate" value="#{viewEWSEntryDialog.eWSEntry.creationDate}" readonly="true">
			<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
			<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
			<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
		</p:inputText>
		<p:tooltip for="txtCreationDate" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_abstractentitywithid_lastupdate}:" for="txtLastUpdate" styleClass="label-field-optional"/>
		<p:inputText id="txtLastUpdate" value="#{viewEWSEntryDialog.eWSEntry.lastUpdate}" readonly="true">
			<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
			<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
			<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
		</p:inputText>
		<p:tooltip for="txtLastUpdate" value=""/>

	</h:panelGrid>
	</p:tab>
	</p:tabView>


	<p:scrollPanel mode="native" style="flex: 1 1 auto; width: 100%; min-height: 80px; padding: unset; border: unset;" >
	<h:panelGrid columns="1">
		<h:outputText styleClass="header-label" value="#{i18n.panel_viewewsentrydialog_panreceivers_title}"/>
	</h:panelGrid>
	<h:panelGrid columns="1">
		<ui:include src="panel/EWSEntryReceiversPanel.xhtml"/>
	</h:panelGrid>
	</p:scrollPanel>
</h:panelGroup>

	<p/>

	<h:panelGrid columns="1">
		<p:commandButton id="cmdBack" icon="pi pi-caret-left" value="#{i18n.command_back}" action="#{userSession.getLastPage}" immediate="true" ajax="false"/>
	</h:panelGrid>

	<p:defaultCommand target=":form:cmdBack"/>

</ui:define>
</ui:composition>
