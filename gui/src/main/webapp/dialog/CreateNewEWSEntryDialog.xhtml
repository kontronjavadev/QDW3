<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:p="http://primefaces.org/ui"
	template="/templates/ui.xhtml">

<f:metadata>
	<f:viewAction action="#{createNewEWSEntryDialog.initView()}"/>
</f:metadata>

<ui:define name="title">#{createNewEWSEntryDialog.formTitle}</ui:define>

<ui:define name="content">
	<p:dialog header="#{i18n.feedback_dialog_header}" modal="true" widgetVar="msgBox" visible="#{(not empty facesContext.messageList)}">
		<p:messages id="messages" showDetail="true" showSummary="true"/>
	</p:dialog>

	<h:panelGrid columns="3">
		<div class="pi pi-file-edit" style="font-size: 2em"/>
		<h:outputText id="lblFormTitle" value="&#160;#{createNewEWSEntryDialog.formTitle}" styleClass="label-form-title"/>
		<p:ajaxStatus style="width:16px;height:16px;">
			<f:facet name="start">
				<h:graphicImage value="/images/ajaxloading.gif"/>
			</f:facet>

			<f:facet name="complete">
				<h:outputText value=""/>
			</f:facet>
		</p:ajaxStatus>
	</h:panelGrid>

	<p:panel>
	<h:panelGrid columns="1">
		<h:outputText styleClass="header-label" value="#{i18n.panel_basic_title}"/>
	</h:panelGrid>

	<h:panelGrid columns="6">

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_threshold} *:" for="txtThreshold" styleClass="label-field-mandatory"/>
		<p:inputText id="txtThreshold" value="#{createNewEWSEntryDialog.eWSEntry.threshold}">
			<f:convertNumber pattern="#{userSession.numberFormat}"/>
			<f:validateRequired/>
		</p:inputText>
		<p:tooltip for="txtThreshold" value=""/>

		<h:outputLabel value="#{i18n.lbl_assoc_ewsentry_material} *:" for="cboMaterial" styleClass="label-field-mandatory"/>
		<p:autoComplete id="cboMaterial" value="#{createNewEWSEntryDialog.eWSEntry.material}" converter="#{materialListDTOConverter}" minQueryLength="2" forceSelection="true" completeMethod="#{createNewEWSEntryDialog.onCompleteMaterial}" var="cboMaterialItem" itemValue="#{cboMaterialItem}" itemLabel="#{cboMaterialItem.materialNumber}">
			<f:validateRequired/>
		</p:autoComplete>
		<p:tooltip for="cboMaterial" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_type} *:" for="cboType" styleClass="label-field-mandatory"/>
		<p:selectOneMenu converter="#{eWSTypeConverter}" id="cboType" value="#{createNewEWSEntryDialog.eWSEntry.type}">
			<f:selectItems value="#{createNewEWSEntryDialog.typeList}"/>
		</p:selectOneMenu>
		<p:tooltip for="cboType" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_boardorsystem} *:" for="chkBoardOrSystem" styleClass="label-field-mandatory"/>
		<p:selectBooleanCheckbox id="chkBoardOrSystem" value="#{createNewEWSEntryDialog.eWSEntry.boardOrSystem}"/>
		<p:tooltip for="chkBoardOrSystem" value=""/>

		<h:outputLabel value="#{i18n.lbl_attr_ewsentry_filtercriterion}:" for="txtFilterCriterion" styleClass="label-field-optional"/>
		<p:inputTextarea style="width:200px;height:80px;" id="txtFilterCriterion" value="#{createNewEWSEntryDialog.eWSEntry.filterCriterion}">
			<f:validateLength maximum="1000"/>
		</p:inputTextarea>
		<p:tooltip for="txtFilterCriterion" value=""/>
		<h:outputLabel/>
		<h:outputLabel/>
		<h:outputLabel/>

	</h:panelGrid>
	</p:panel>


	<p:panel>
	<h:panelGrid columns="1">
		<h:outputText styleClass="header-label" value="#{i18n.panel_createnewewsentrydialog_panreceivers_title}"/>
	</h:panelGrid>

	<h:panelGrid columns="3">

		<h:panelGroup id="listReceiversGroup">
		<h:outputLabel/>
		<h:panelGrid columns="3">
			<h:outputLabel styleClass="label-field-mandatory" value="#{i18n.label_list_enter_filter}" for="listReceiversFilter"/>
			<p:inputText id="listReceiversFilter" value="#{createNewEWSEntryDialog.receiversFilterCriterion}">
			</p:inputText>
			<p:commandButton value="#{i18n.command_filter}" process="listReceiversGroup" action="#{createNewEWSEntryDialog.filterReceivers}" update="listReceivers" id="listReceiversButton"/>
		</h:panelGrid>

		<h:outputLabel value="" for="listReceivers"/>
		<p:pickList id="listReceivers" value="#{createNewEWSEntryDialog.receiversList}" converter="#{userListDTOConverter}" addLabel="#{i18n.pick_list_add}" addAllLabel="#{i18n.pick_list_add_all}" removeLabel="#{i18n.pick_list_remove}" removeAllLabel="#{i18n.pick_list_remove_all}" var="listReceiversItem" itemValue="#{listReceiversItem}" itemLabel="#{listReceiversItem.name}"/>
		<p:tooltip for="listReceivers" value=""/>
		</h:panelGroup>

	</h:panelGrid>
	</p:panel>

	<p/>

	<h:panelGrid columns="2">
		<p:commandButton id="cmdSave" icon="pi pi-save" action="#{createNewEWSEntryDialog.save}" value="#{i18n.command_save}" ajax="false"/>
		<p:commandButton id="cmdBack" icon="pi pi-caret-left" value="#{i18n.command_back}" action="#{userSession.getLastPage}" immediate="true" ajax="false"/>
	</h:panelGrid>

</ui:define>
</ui:composition>
