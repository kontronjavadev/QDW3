<ui:composition xmlns="https://jakarta.ee/xml/ns/jakartaee"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:p="http://primefaces.org/ui">

	<p:menubar>
		<p:submenu icon="pi pi-file" label="#{i18n.mnu_file}" id="gridSerialObjectShipmentsPanel_mniFile">
		</p:submenu>
		<p:submenu icon="pi pi-refresh" label="#{i18n.mnu_view}">
			<p:menuitem value="#{i18n.action_refresh}" ajax="false" icon="pi pi-refresh" actionListener="#{serialObjectShipmentsPanel.fetchShipments}"/>
		</p:submenu>
		<p:submenu icon="pi pi-print" label="#{i18n.mnu_export}">
			<p:menuitem value="#{i18n.action_export_xls}" ajax="false" icon="pi pi-file-excel">
				<p:dataExporter type="xls" target="gridSerialObjectShipmentsPanel" fileName="ShipmentList"/>
			</p:menuitem>
			<p:menuitem value="#{i18n.action_export_pdf}" ajax="false" icon="pi pi-file-pdf">
				<p:dataExporter type="pdf" target="gridSerialObjectShipmentsPanel" fileName="ShipmentList"/>
			</p:menuitem>
		</p:submenu>
	</p:menubar>

	<br/>

	<p:dataTable id="gridSerialObjectShipmentsPanel" var="serialObjectShipmentsPanelItem" rows="50"
		selectionMode="single"
		selection="#{serialObjectShipmentsPanel.selItemOfShipments}"
		loadingMessage="#{i18n.action_fetch_data}"
		value="#{serialObjectShipmentsPanel.shipmentsList}" scrollable="false"
		paginatorPosition="top" paginatorAlwaysVisible="false" paginator="true" resizableColumns="true"
		rowKey="#{serialObjectShipmentsPanelItem.id}"
		paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
		rowsPerPageTemplate="10,50,100,500,1000">
		<p:ajax event="rowDblselect" listener="#{serialObjectShipmentsPanel.onShipmentsGridDoubleClick}"/>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.plantCode}" width="100" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_plantcode}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.plantCode}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.movementTypeCode}" width="80" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_movementtypecode}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.movementTypeCode}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.orderNumber}" width="100" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_ordernumber}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.orderNumber}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.matRevMatMaterialNumber}" width="150" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_matrevmatmaterialnumber}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.matRevMatMaterialNumber}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.matRevMatSapNumber}" width="150" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_matrevmatsapnumber}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.matRevMatSapNumber}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.matRevRevisionNumber}" width="150" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_matrevrevisionnumber}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.matRevRevisionNumber}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.customerName}" width="200" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_customername}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.customerName}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.shipmentDate}" width="80" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serialobjectshipmentspanel_shipmentdate}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.shipmentDate}">
				<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateConverter"/>
				<f:attribute name="pattern" value="#{userSession.dateFormat}"/>
				<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.creationDate}" width="120" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractentitywithid_creationdate}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.creationDate}">
				<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
				<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
				<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serialObjectShipmentsPanelItem.lastUpdate}" width="120" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractentitywithid_lastupdate}"/>
			</f:facet>
			<h:outputText value="#{serialObjectShipmentsPanelItem.lastUpdate}">
				<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
				<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
				<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
			</h:outputText>
		</p:column>
	</p:dataTable>
	<p/>

	<h:outputText styleClass="label-field-mandatory" value="#{i18n.result_total_number_records} #{serialObjectShipmentsPanel.shipmentsList.size()}"/>

	<p:contextMenu for="gridSerialObjectShipmentsPanel">
		<p:menuitem value="#{i18n.action_delete}" ajax="true" icon="pi pi-trash" id="gridSerialObjectShipmentsPanel_mniDelete" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR') and not serialObjectShipmentsPanel.readOnly}" onclick="PF('deleteConfirmShipments').show()"/>
		<p:menuitem value="#{i18n.action_view}" ajax="true" icon="pi pi-file" id="gridSerialObjectShipmentsPanel_mniView" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR;READONLY')}" action="#{serialObjectShipmentsPanel.openViewShipmentDialog}">
			<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{serialObjectShipmentsPanel.currentPageURL}"/>
		</p:menuitem>
		<p:menuitem value="#{i18n.action_copy}" ajax="true" icon="pi pi-copy" id="gridSerialObjectShipmentsPanel_mniCopy" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR') and not serialObjectShipmentsPanel.readOnly}" onclick="PF('copyConfirmShipments').show()"/>
		<p:menuitem value="#{i18n.action_refresh}" ajax="false" type="push" icon="pi pi-refresh" id="gridSerialObjectShipmentsPanel_mniRefresh" actionListener="#{serialObjectShipmentsPanel.fetchShipments}"/>
	</p:contextMenu>

	<p:confirmDialog modal="true" message="#{i18n.dialog_delete_question}" header="#{i18n.dialog_delete_title}" severity="alert" widgetVar="deleteConfirmShipments">
		<p:commandButton value="#{i18n.command_yes}" oncomplete="PF('deleteConfirmShipments').hide()" actionListener="#{serialObjectShipmentsPanel.deleteShipment}" id="gridSerialObjectShipmentsPanel_cmdYesDelete" ajax="false"/>
		<p:commandButton value="#{i18n.command_no}" onclick="PF('deleteConfirmShipments').hide()" type="button"/>
	</p:confirmDialog>

	<p:confirmDialog modal="true" message="#{i18n.dialog_copy_question}" header="#{i18n.dialog_copy_title}" severity="info" widgetVar="copyConfirmShipments">
		<p:commandButton value="#{i18n.command_yes}" oncomplete="PF('copyConfirmShipments').hide()" action="#{serialObjectShipmentsPanel.copy}" id="gridSerialObjectShipmentsPanel_cmdYesCopy" ajax="false"/>
		<p:commandButton value="#{i18n.command_no}" onclick="PF('copyConfirmShipments').hide()" type="button"/>
	</p:confirmDialog>

</ui:composition>
