	<p:contextMenu for="gridSerialObjectServiceMessagesPanel">
		<p:menuitem value="#{i18n.action_delete}" ajax="true" icon="pi pi-trash" id="gridSerialObjectServiceMessagesPanel_mniDelete" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR') and not serialObjectServiceMessagesPanel.readOnly}" onclick="PF('deleteConfirmServiceMessages').show()"/>
		<p:menuitem value="#{i18n.action_view}" ajax="true" icon="pi pi-file" id="gridSerialObjectServiceMessagesPanel_mniView" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR;READONLY')}" action="#{serialObjectServiceMessagesPanel.openViewServiceMessageDialog}">
			<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{serialObjectServiceMessagesPanel.currentPageURL}"/>
		</p:menuitem>
		<p:menuitem value="#{i18n.action_copy}" ajax="true" icon="pi pi-copy" id="gridSerialObjectServiceMessagesPanel_mniCopy" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR') and not serialObjectServiceMessagesPanel.readOnly}" onclick="PF('copyConfirmServiceMessages').show()"/>

	<p:confirmDialog modal="true" message="#{i18n.dialog_delete_question}" header="#{i18n.dialog_delete_title}" severity="alert" widgetVar="deleteConfirmServiceMessages">
