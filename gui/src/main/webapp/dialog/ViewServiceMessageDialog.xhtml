<ui:composition xmlns="http://www.w3.org/1999/xhtml"

	xmlns:h="jakarta.faces.html"

<f:metadata>
	<f:viewAction action="#{viewServiceMessageDialog.initView()}"/>
	<f:viewParam name="selectedObjectId" value="#{viewServiceMessageDialog.selectedObjectId}"/>
</f:metadata>

<ui:define name="title">#{viewServiceMessageDialog.formTitle}</ui:define>

	</p:dialog>

		<h:outputText id="lblFormTitle" value="&#160;#{viewServiceMessageDialog.formTitle}" styleClass="label-form-title"/>
		<p:ajaxStatus style="width:16px;height:16px;">
			<f:facet name="start">
				<h:graphicImage value="/images/ajaxloading.gif"/>
			</f:facet>

			<f:facet name="complete">
				<h:outputText value=""/>
			</f:facet>
		</p:ajaxStatus>
	</h:panelGrid>
