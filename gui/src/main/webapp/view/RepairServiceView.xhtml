<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:p="http://primefaces.org/ui"
	template="/templates/ui.xhtml">

<f:metadata>
	<f:viewAction action="#{repairServiceView.fetchRepairServices()}"/>
</f:metadata>

<ui:define name="title">#{repairServiceView.formTitle}</ui:define>

<ui:define name="content">
	<h:panelGrid columns="3">
		<div class="pi pi-list" style="font-size: 2em"/>
		<h:outputText id="lblFormTitle" value="&#160;#{repairServiceView.formTitle}" styleClass="label-form-title"/>
		<p:ajaxStatus style="width:16px;height:16px;">
			<f:facet name="start">
				<h:graphicImage value="/images/ajaxloading.gif"/>
			</f:facet>

			<f:facet name="complete">
				<h:outputText value=""/>
			</f:facet>
		</p:ajaxStatus>
	</h:panelGrid>

	<p:growl id="growl" showDetail="true"/>

	<p:menubar>
		<p:submenu icon="pi pi-file" label="#{i18n.mnu_file}" id="panData_mniFile">
			<p:menuitem value="#{i18n.action_create}" ajax="true" id="panData_mniCreate" icon="pi pi-plus" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR')}" action="#{repairServiceView.openCreateNewRepairServiceDialog}">
				<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{repairServiceView.currentPageURL}"/>
			</p:menuitem>
		</p:submenu>
		<p:submenu icon="pi pi-refresh" label="#{i18n.mnu_view}">
			<p:menuitem value="#{i18n.action_refresh}" ajax="false" icon="pi pi-refresh" actionListener="#{repairServiceView.fetchRepairServices}"/>
		</p:submenu>
		<p:submenu icon="pi pi-print" label="#{i18n.mnu_export}">
			<p:menuitem value="#{i18n.action_export_xls}" ajax="false" icon="pi pi-file-excel">
				<p:dataExporter type="xls" target="panData" fileName="RepairServiceList"/>
			</p:menuitem>
			<p:menuitem value="#{i18n.action_export_pdf}" ajax="false" icon="pi pi-file-pdf">
				<p:dataExporter type="pdf" target="panData" fileName="RepairServiceList"/>
			</p:menuitem>
		</p:submenu>
	</p:menubar>

	<br/>

	<p:dataTable id="panData" var="repairServiceViewItem" rows="50"
		selectionMode="single"
		selection="#{repairServiceView.selectedObject}"
		loadingMessage="#{i18n.action_fetch_data}"
		value="#{repairServiceView.repairServicesList}" scrollable="false"
		paginatorPosition="top" paginatorAlwaysVisible="false" paginator="true" resizableColumns="true"
		rowKey="#{repairServiceViewItem.code}"
		paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
		rowsPerPageTemplate="10,50,100,500,1000">
		<p:ajax event="rowDblselect" listener="#{repairServiceView.onDoubleClick}"/>

		<p:column sortBy="#{repairServiceViewItem.code}" width="100" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractfuntionalentity_code}"/>
			</f:facet>
			<h:outputText value="#{repairServiceViewItem.code}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{repairServiceViewItem.name}" width="150" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_repairservice_name}"/>
			</f:facet>
			<h:outputText value="#{repairServiceViewItem.name}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{repairServiceViewItem.shortText}" width="250" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractfuntionalentity_shorttext}"/>
			</f:facet>
			<h:outputText value="#{repairServiceViewItem.shortText}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{repairServiceViewItem.comment}" width="250" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractfuntionalentity_comment}"/>
			</f:facet>
			<h:outputText value="#{repairServiceViewItem.comment}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{repairServiceViewItem.creationDate}" width="120" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractfuntionalentity_creationdate}"/>
			</f:facet>
			<h:outputText value="#{repairServiceViewItem.creationDate}">
				<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
				<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
				<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
			</h:outputText>
		</p:column>

		<p:column sortBy="#{repairServiceViewItem.lastUpdate}" width="120" >
			<f:facet name="header">
				<h:outputText value="#{i18n.lbl_attr_abstractfuntionalentity_lastupdate}"/>
			</f:facet>
			<h:outputText value="#{repairServiceViewItem.lastUpdate}">
				<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateTimeConverter"/>
				<f:attribute name="pattern" value="#{userSession.dateTimeFormat}"/>
				<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
			</h:outputText>
		</p:column>
	</p:dataTable>
	<p/>

	<h:outputText styleClass="label-field-mandatory" value="#{i18n.result_total_number_records} #{repairServiceView.repairServicesList.size()}"/>
	<p/>

	<p:contextMenu for="panData">
		<p:menuitem value="#{i18n.action_delete}" ajax="true" icon="pi pi-trash" id="panData_mniDelete" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR')}" onclick="PF('deleteConfirm').show()"/>
		<p:menuitem value="#{i18n.action_create}" ajax="true" icon="pi pi-plus" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR')}" action="#{repairServiceView.openCreateNewRepairServiceDialog}">
			<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{repairServiceView.currentPageURL}"/>
		</p:menuitem>
		<p:menuitem value="#{i18n.action_edit}" ajax="true" icon="pi pi-pencil" id="panData_mniUpdate" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR')}" action="#{repairServiceView.openEditRepairServiceDialog}">
			<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{repairServiceView.currentPageURL}"/>
		</p:menuitem>
		<p:menuitem value="#{i18n.action_view}" ajax="true" icon="pi pi-file" id="panData_mniView" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR')}" action="#{repairServiceView.openViewRepairServiceDialog}">
			<f:setPropertyActionListener target="#{userSession.lastPage}" value="#{repairServiceView.currentPageURL}"/>
		</p:menuitem>
		<p:menuitem value="#{i18n.action_copy}" ajax="true" icon="pi pi-copy" id="panData_mniCopy" rendered="#{userSession.checkAuthorizationString('ADMINISTRATOR')}" onclick="PF('copyConfirm').show()"/>
		<p:menuitem value="#{i18n.action_refresh}" ajax="false" type="push" icon="pi pi-refresh" id="panData_mniRefresh" actionListener="#{repairServiceView.fetchRepairServices}"/>
	</p:contextMenu>

	<p:confirmDialog modal="true" message="#{i18n.dialog_delete_question}" header="#{i18n.dialog_delete_title}" severity="alert" widgetVar="deleteConfirm">
		<p:commandButton value="#{i18n.command_yes}" oncomplete="PF('deleteConfirm').hide()" actionListener="#{repairServiceView.deleteRepairService}" id="panData_cmdYesDelete" ajax="false"/>
		<p:commandButton value="#{i18n.command_no}" onclick="PF('deleteConfirm').hide()" type="button"/>
	</p:confirmDialog>

	<p:confirmDialog modal="true" message="#{i18n.dialog_copy_question}" header="#{i18n.dialog_copy_title}" severity="info" widgetVar="copyConfirm">
		<p:commandButton value="#{i18n.command_yes}" oncomplete="PF('copyConfirm').hide()" action="#{repairServiceView.copy}" id="panData_cmdYesCopy" ajax="false"/>
		<p:commandButton value="#{i18n.command_no}" onclick="PF('copyConfirm').hide()" type="button"/>
	</p:confirmDialog>

</ui:define>
</ui:composition>
