<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:p="http://primefaces.org/ui"
	template="/templates/ui.xhtml">

<f:metadata>
	<f:viewAction action="#{serviceOrderView.initView()}"/>
</f:metadata>

<ui:define name="title">#{serviceOrderView.formTitle}</ui:define>

<ui:define name="content">
	<h:panelGrid columns="3">
		<div class="pi pi-list" style="font-size: 2em"/>
		<h:outputText id="lblFormTitle" value="&#160;#{serviceOrderView.formTitle}" styleClass="label-form-title"/>
		<p:ajaxStatus style="width:16px;height:16px;">
			<f:facet name="start">
				<h:graphicImage value="/images/ajaxloading.gif"/>
			</f:facet>

			<f:facet name="complete">
				<h:outputText value=""/>
			</f:facet>
		</p:ajaxStatus>
	</h:panelGrid>

	<p:growl id="growl" showDetail="true" skipDetailIfEqualsSummary="true" keepAlive="true" life="10000" />

	<p:dialog height="auto" width="1000" id="dlgSearchInput" closeOnEscape="true" header="#{i18n.search_input_dlg}" widgetVar="dlgSearchInput" modal="true" >
		<p:tabView id="tabViewSearchInput" dynamic="false">
			<p:tab title="#{i18n.search_input_filter}">
			<p:scrollPanel style="width:100%; #{sizeServiceBean.searchFilterHeight()};" mode="native">
			<h:panelGrid columns="5" cellpadding="3">
				<h:outputText styleClass="label-field-mandatory" value="#{i18n.search_input_column}"/>
				<h:outputText styleClass="label-field-mandatory" value="#{i18n.search_input_operator}"/>
				<h:outputText styleClass="label-field-mandatory" value="#{i18n.search_input_sort}"/>
				<h:outputText styleClass="label-field-mandatory" value="#{i18n.search_input_filter_input}"/>
				<h:outputText styleClass="label-field-mandatory" value="#{i18n.search_input_and}"/>

				<h:outputLabel styleClass="label-field-optional" for="fi_0" value="#{serviceOrderView.searchObject.searchFields[0].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_0" value="#{serviceOrderView.searchObject.searchFields[0].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_0" value="#{serviceOrderView.textOperators}" var="advInputItem0" itemValue="#{advInputItem0}" itemLabel="#{advInputItem0.description}"/>
					<f:ajax render="p_0"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_0" id="s_0" value="#{serviceOrderView.searchObject.searchFields[0].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:inputText id="fi_0" value="#{serviceOrderView.searchObject.searchFields[0].stringCriterion}" size="30"/>
				<h:panelGroup id="p_0">
					<p:inputText id="b_0" rendered="#{serviceOrderView.searchObject.searchFields[0].between}" value="#{serviceOrderView.searchObject.searchFields[0].stringBetweenCriterion}" size="30"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fc_1" value="#{serviceOrderView.searchObject.searchFields[1].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_1" value="#{serviceOrderView.searchObject.searchFields[1].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_1" value="#{serviceOrderView.enumOperators}" var="advInputItem1" itemValue="#{advInputItem1}" itemLabel="#{advInputItem1.description}"/>
					<f:ajax render="p_1"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_1" id="s_1" value="#{serviceOrderView.searchObject.searchFields[1].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:selectOneMenu id="fc_1" value="#{serviceOrderView.searchObject.searchFields[1].stringCriterion}">
					<f:selectItem itemLabel="" itemValue=""/>
					<f:selectItem itemLabel="#{i18n.serviceordertype_rma}" itemValue="RMA"/>
					<f:selectItem itemLabel="#{i18n.serviceordertype_production}" itemValue="PRODUCTION"/>
					<f:selectItem itemLabel="#{i18n.serviceordertype_incoming_inspection}" itemValue="INCOMING_INSPECTION"/>
				</p:selectOneMenu>
				<h:panelGroup id="p_1"/>

				<h:outputLabel styleClass="label-field-optional" for="fi_2" value="#{serviceOrderView.searchObject.searchFields[2].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_2" value="#{serviceOrderView.searchObject.searchFields[2].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_2" value="#{serviceOrderView.dateOperators}" var="advInputItem2" itemValue="#{advInputItem2}" itemLabel="#{advInputItem2.description}"/>
					<f:ajax render="p_2"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_2" id="s_2" value="#{serviceOrderView.searchObject.searchFields[2].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:datePicker id="fi_2" value="#{serviceOrderView.searchObject.searchFields[2].dateCriterion}" pattern="#{userSession.dateFormat}" size="20" showButtonBar="true" showIcon="true"/>
				<h:panelGroup id="p_2">
					<p:datePicker id="fb_2" value="#{serviceOrderView.searchObject.searchFields[2].dateBetweenCriterion}" pattern="#{userSession.dateFormat}" size="20" showButtonBar="true" showIcon="true" rendered="#{serviceOrderView.searchObject.searchFields[2].between}"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fi_3" value="#{serviceOrderView.searchObject.searchFields[3].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_3" value="#{serviceOrderView.searchObject.searchFields[3].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_3" value="#{serviceOrderView.textOperators}" var="advInputItem3" itemValue="#{advInputItem3}" itemLabel="#{advInputItem3.description}"/>
					<f:ajax render="p_3"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_3" id="s_3" value="#{serviceOrderView.searchObject.searchFields[3].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:autoComplete minQueryLength="2" maxResults="10" completeMethod="#{serviceOrderView.onCompleteCustomerName}" id="fi_3" value="#{serviceOrderView.searchObject.searchFields[3].stringCriterion}" size="30"/>
				<h:panelGroup id="p_3">
				<p:autoComplete minQueryLength="2" rendered="#{serviceOrderView.searchObject.searchFields[3].between}" maxResults="10" completeMethod="#{serviceOrderView.onCompleteCustomerName}" id="b_3" value="#{serviceOrderView.searchObject.searchFields[3].stringBetweenCriterion}" size="30"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fi_4" value="#{serviceOrderView.searchObject.searchFields[4].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_4" value="#{serviceOrderView.searchObject.searchFields[4].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_4" value="#{serviceOrderView.textOperators}" var="advInputItem4" itemValue="#{advInputItem4}" itemLabel="#{advInputItem4.description}"/>
					<f:ajax render="p_4"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_4" id="s_4" value="#{serviceOrderView.searchObject.searchFields[4].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:autoComplete minQueryLength="2" maxResults="10" completeMethod="#{serviceOrderView.onCompleteSupplierName}" id="fi_4" value="#{serviceOrderView.searchObject.searchFields[4].stringCriterion}" size="30"/>
				<h:panelGroup id="p_4">
				<p:autoComplete minQueryLength="2" rendered="#{serviceOrderView.searchObject.searchFields[4].between}" maxResults="10" completeMethod="#{serviceOrderView.onCompleteSupplierName}" id="b_4" value="#{serviceOrderView.searchObject.searchFields[4].stringBetweenCriterion}" size="30"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fi_5" value="#{serviceOrderView.searchObject.searchFields[5].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_5" value="#{serviceOrderView.searchObject.searchFields[5].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_5" value="#{serviceOrderView.textOperators}" var="advInputItem5" itemValue="#{advInputItem5}" itemLabel="#{advInputItem5.description}"/>
					<f:ajax render="p_5"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_5" id="s_5" value="#{serviceOrderView.searchObject.searchFields[5].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:inputText id="fi_5" value="#{serviceOrderView.searchObject.searchFields[5].stringCriterion}" size="30"/>
				<h:panelGroup id="p_5">
					<p:inputText id="b_5" rendered="#{serviceOrderView.searchObject.searchFields[5].between}" value="#{serviceOrderView.searchObject.searchFields[5].stringBetweenCriterion}" size="30"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fi_6" value="#{serviceOrderView.searchObject.searchFields[6].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_6" value="#{serviceOrderView.searchObject.searchFields[6].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_6" value="#{serviceOrderView.textOperators}" var="advInputItem6" itemValue="#{advInputItem6}" itemLabel="#{advInputItem6.description}"/>
					<f:ajax render="p_6"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_6" id="s_6" value="#{serviceOrderView.searchObject.searchFields[6].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:inputText id="fi_6" value="#{serviceOrderView.searchObject.searchFields[6].stringCriterion}" size="30"/>
				<h:panelGroup id="p_6">
					<p:inputText id="b_6" rendered="#{serviceOrderView.searchObject.searchFields[6].between}" value="#{serviceOrderView.searchObject.searchFields[6].stringBetweenCriterion}" size="30"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fc_7" value="#{serviceOrderView.searchObject.searchFields[7].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_7" value="#{serviceOrderView.searchObject.searchFields[7].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_7" value="#{serviceOrderView.boolOperators}" var="advInputItem7" itemValue="#{advInputItem7}" itemLabel="#{advInputItem7.description}"/>
					<f:ajax render="p_7"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_7" id="s_7" value="#{serviceOrderView.searchObject.searchFields[7].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:selectOneMenu id="fc_7" value="#{serviceOrderView.searchObject.searchFields[7].stringCriterion}">
					<f:selectItem itemLabel="" itemValue=""/>
					<f:selectItem itemLabel="true" itemValue="true"/>
					<f:selectItem itemLabel="false" itemValue="false"/>
				</p:selectOneMenu>
				<h:panelGroup id="p_7"/>

				<h:outputLabel styleClass="label-field-optional" for="fi_8" value="#{serviceOrderView.searchObject.searchFields[8].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_8" value="#{serviceOrderView.searchObject.searchFields[8].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_8" value="#{serviceOrderView.dateOperators}" var="advInputItem8" itemValue="#{advInputItem8}" itemLabel="#{advInputItem8.description}"/>
					<f:ajax render="p_8"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_8" id="s_8" value="#{serviceOrderView.searchObject.searchFields[8].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:datePicker id="fi_8" value="#{serviceOrderView.searchObject.searchFields[8].dateCriterion}" pattern="#{userSession.dateTimeFormat}" size="20" showButtonBar="true" showIcon="true" showTime="true"/>
				<h:panelGroup id="p_8">
					<p:datePicker id="fb_8" value="#{serviceOrderView.searchObject.searchFields[8].dateBetweenCriterion}" pattern="#{userSession.dateTimeFormat}" size="20" showButtonBar="true" showIcon="true" rendered="#{serviceOrderView.searchObject.searchFields[8].between}" showTime="true"/>
				</h:panelGroup>

				<h:outputLabel styleClass="label-field-optional" for="fi_9" value="#{serviceOrderView.searchObject.searchFields[9].colLabel}"/>
				<p:selectOneMenu valueChangeListener="#{serviceOrderView.onOperatorChanged}" style="width:150px;" styleClass="label-field-optional" id="o_9" value="#{serviceOrderView.searchObject.searchFields[9].operator}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchOperatorDTOConverter">
					<f:selectItems update="b_9" value="#{serviceOrderView.dateOperators}" var="advInputItem9" itemValue="#{advInputItem9}" itemLabel="#{advInputItem9.description}"/>
					<f:ajax render="p_9"/>
				</p:selectOneMenu>
				<p:selectOneMenu styleClass="label-field-optional" widgetVar="st_9" id="s_9" value="#{serviceOrderView.searchObject.searchFields[9].sortOrder}">
					<f:selectItems value="#{serviceOrderView.sortOrderList}"/>
				</p:selectOneMenu>
				<p:datePicker id="fi_9" value="#{serviceOrderView.searchObject.searchFields[9].dateCriterion}" pattern="#{userSession.dateTimeFormat}" size="20" showButtonBar="true" showIcon="true" showTime="true"/>
				<h:panelGroup id="p_9">
					<p:datePicker id="fb_9" value="#{serviceOrderView.searchObject.searchFields[9].dateBetweenCriterion}" pattern="#{userSession.dateTimeFormat}" size="20" showButtonBar="true" showIcon="true" rendered="#{serviceOrderView.searchObject.searchFields[9].between}" showTime="true"/>
				</h:panelGroup>

			</h:panelGrid>
			</p:scrollPanel>
			</p:tab>

			<p:tab title="#{i18n.search_input_adv}">
			<h:panelGrid columns="2">
				<h:outputLabel value="#{i18n.search_input_case}:" styleClass="label-field-mandatory"/>
				<p:selectBooleanCheckbox value="#{serviceOrderView.searchObject.caseSensitive}"/>
				<h:outputLabel value="#{i18n.search_input_count}:" styleClass="label-field-mandatory"/>
				<p:selectBooleanCheckbox value="#{serviceOrderView.searchObject.count}"/>
				<h:outputLabel value="#{i18n.search_input_filter_match}:" styleClass="label-field-mandatory"/>
				<p:selectBooleanCheckbox value="#{serviceOrderView.searchObject.exactFilterMatch}"/>
				<h:outputLabel value="#{i18n.search_input_filter_fetch_size}:" styleClass="label-field-mandatory"/>
				<p:inputText value="#{serviceOrderView.searchObject.maxResult}" size="5">
					<f:validateLongRange minimum="1" maximum="1000000"/>
				</p:inputText>
				<h:outputLabel value="#{i18n.search_input_visible_fields_label}:" styleClass="label-field-mandatory"/>
				<p:pickList styleClass="searchdialog-picklist" value="#{serviceOrderView.visibleFields}" var="savedQueryListItem" itemLabel="#{savedQueryListItem.colLabel}" itemValue="#{savedQueryListItem}" converter="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.SearchFieldDTOConverter" addLabel="#{i18n.pick_list_add}" addAllLabel="#{i18n.pick_list_add_all}" removeLabel="#{i18n.pick_list_remove}" removeAllLabel="#{i18n.pick_list_remove_all}">
					<f:facet name="sourceCaption">#{i18n.search_input_all_fields}</f:facet>
					<f:facet name="targetCaption">#{i18n.search_input_visible_fields}</f:facet>
				</p:pickList>
			</h:panelGrid>
			</p:tab>

			<p:tab title="#{i18n.search_input_saved_query_title}">
				<h:panelGrid columns="1">
					<h:outputLabel styleClass="label-field-mandatory" value="#{i18n.search_input_lbl_saved_query}"/>
					<p:selectOneListbox id="savedQueryList" value="#{serviceOrderView.selectedSavedQuery}" style="#{sizeServiceBean.searchQueriesHeight()}; width:946px" styleClass="flex-listbox" >
						<f:selectItems value="#{serviceOrderView.savedQueries}"/>
					</p:selectOneListbox>
					<h:panelGrid columns="3">
						<p:commandButton icon="pi pi-caret-right" value="#{i18n.search_input_run_saved_query}" action="#{serviceOrderView.runSavedQuery}" ajax="false"/>
						<p:commandButton icon="pi pi-pencil" value="#{i18n.search_input_rename_saved_query}" actionListener="#{serviceOrderView.openRenameDialog}" ajax="true"/>
						<p:commandButton icon="pi pi-eraser" value="#{i18n.search_input_delete_saved_query}" actionListener="#{serviceOrderView.deleteSavedQuery}" update="savedQueryList" ajax="true"/>
					</h:panelGrid>
				</h:panelGrid>
			</p:tab>
		</p:tabView>

		<h:panelGrid columns="4">
			<p:commandButton id="cmdSearch" value="#{i18n.search_input_perform_search}" action="#{serviceOrderView.fetchServiceOrders}" ajax="false"/>
			<p:commandButton id="cmdReset" value="#{i18n.command_reset}" action="#{serviceOrderView.resetSearchObject}" onclick="PF('dlgSearchInput').hide()" ajax="false"/>
			<p:commandButton id="cmdClear" value="#{i18n.command_clear}" action="#{serviceOrderView.clearSearchObject}" update="tabViewSearchInput" ajax="true"/>
			<p:commandButton id="cmdCount" value="#{i18n.search_input_perform_count}" actionListener="#{serviceOrderView.countRecords}" update="growl" ajax="true"/>
		</h:panelGrid>
	</p:dialog>

<!-- Query rename dialog -->
	<p:dialog widgetVar="dlgQeryRename" id="dlgQeryRename" modal="true" showEffect="fade" hideEffect="fade" focus="txtNewQueryName" closeOnEscape="true">
		<f:facet name="header">
			<i class="pi pi-pencil"/>
			<h:outputText value="&#160;#{i18n.query_rename_title}"/>
		</f:facet>

		<h:panelGrid columns="3">
			<h:outputLabel value="#{i18n.query_rename_newname} *:" for="txtNewQueryName" styleClass="label-field-mandatory"/>
			<p:inputText id="txtNewQueryName" value="#{serviceOrderView.newQueryName}"/>
			<p:tooltip for="txtNewQueryName" value=""/>
		</h:panelGrid>
		<p/>

		<f:facet name="footer">
			<p:commandButton id="cmdRename" icon="pi pi-save" value="#{i18n.command_rename}" ajax="true" 
				actionListener="#{serviceOrderView.renameQuery()}"
				update="tabViewSearchInput,growl" oncomplete="PF('dlgQeryRename').hide()"/>

			<p:commandButton id="cmdCancel" icon="pi pi-times" value="#{i18n.command_cancel}" onclick="PF('dlgQeryRename').hide()" />

			<p:defaultCommand target="cmdRename" scope="dlgQeryRename"/>
		</f:facet>
	</p:dialog>



	<p:menubar>
		<p:submenu icon="pi pi-file" label="#{i18n.mnu_file}" id="panData_mniFile">
			<p:menuitem value="#{i18n.search_input_dlg_save_query}" icon="pi pi-save" onclick="PF('dlgSaveQuery').show()"/>
		</p:submenu>
		<p:submenu icon="pi pi-refresh" label="#{i18n.mnu_view}">
			<p:menuitem value="#{i18n.action_refresh}" ajax="false" icon="pi pi-refresh" actionListener="#{serviceOrderView.fetchServiceOrders}"/>
		</p:submenu>
		<p:submenu icon="pi pi-print" label="#{i18n.mnu_export}">
			<p:menuitem value="#{i18n.action_export_xls}" ajax="false" icon="pi pi-file-excel">
				<p:dataExporter type="xlsxstream" target="panData" fileName="ServiceOrderList"/>
			</p:menuitem>
			<p:menuitem value="#{i18n.action_export_pdf}" ajax="false" icon="pi pi-file-pdf">
				<p:dataExporter type="pdf" target="panData" fileName="ServiceOrderList"/>
			</p:menuitem>
		</p:submenu>
		<p:menuitem value="#{i18n.action_search_input}" ajax="true" icon="pi pi-search" id="panData_mniSearch" onclick="PF('dlgSearchInput').show()"/>
	</p:menubar>


	<p:dataTable id="panData" var="serviceOrderViewItem" rows="#{serviceOrderView.numberRows}"
		selectionTextDisabled="false" allowUnsorting="true" resizeMode="expand" multiViewState="true" 
		selectionMode="single"
		selection="#{serviceOrderView.selectedObject}"
		loadingMessage="#{i18n.action_fetch_data}"
		value="#{serviceOrderView.serviceOrdersList}" scrollable="true" styleClass="viewScrollable"
		paginatorPosition="top" paginatorAlwaysVisible="#{serviceOrderView.paginatorAlwaysVisible}" paginator="true" resizableColumns="true"
		rowKey="#{serviceOrderViewItem.code}"
		paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
		rowsPerPageTemplate="50,150,400,1000">
		<p:ajax event="rowDblselect" listener="#{serviceOrderView.onDoubleClick}"/>
		<p:ajax event="rowSelect" listener="#{serviceOrderView.onClick}"/>

		<p:column sortBy="#{serviceOrderViewItem.code}" width="100" 
			rendered="#{serviceOrderView.searchObject.searchFields[0].visible}" displayPriority="#{serviceOrderView.searchObject.searchFields[0].colOrder}" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serviceorderview_code}"/>
			</f:facet>
			<h:outputText value="#{serviceOrderViewItem.code}">
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serviceOrderViewItem.serviceOrderType}" width="100" 
			rendered="#{serviceOrderView.searchObject.searchFields[1].visible}" displayPriority="#{serviceOrderView.searchObject.searchFields[1].colOrder}" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serviceorderview_serviceordertype}"/>
			</f:facet>
			<h:outputText value="#{serviceOrderView.translateServiceOrderType(serviceOrderViewItem.serviceOrderType)}"/>
		</p:column>

		<p:column sortBy="#{serviceOrderViewItem.documentDate}" width="80" 
			rendered="#{serviceOrderView.searchObject.searchFields[2].visible}" displayPriority="#{serviceOrderView.searchObject.searchFields[2].colOrder}" 
			exportHeaderValue="#{i18n.lbl_attr_documentdate_tooltip}" class="thnowrap" >
			<f:facet name="header">
				<h:outputText value="#{i18n.col_serviceorderview_documentdate}" title="#{i18n.lbl_attr_documentdate_tooltip}" styleClass="pf-tooltip-target" />
			</f:facet>
			<h:outputText value="#{serviceOrderViewItem.documentDate}">
				<f:converter converterId="net.sourceforge.jbizmo.commons.webclient.primefaces.converter.LocalDateConverter"/>
				<f:attribute name="pattern" value="#{userSession.dateFormat}"/>
				<f:attribute name="timeZone" value="#{userSession.timeZone}"/>
			</h:outputText>
		</p:column>

		<p:column sortBy="#{serviceOrderViewItem.customerName}" width="200" 
			rendered="#{serviceOrderView.searchObject.searchFields[3].visible}" displayPriority="#{serviceOrderView.searchObject.searchFields[3].colOrder}"

		<p:commandButton value="#{i18n.command_no}" onclick="PF('deleteConfirm').hide()" type="button"/>

		<p:commandButton value="#{i18n.command_no}" onclick="PF('copyConfirm').hide()" type="button"/>
	</p:confirmDialog>
